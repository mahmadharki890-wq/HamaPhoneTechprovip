<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hama Tech Phone VIP Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Orbitron:wght@600&display=swap');
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background-color: var(--bg); color: #e0e0e0; font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding-bottom: 20px; }

        /* لید بۆ ناوی سەرەکی */
        .brand-header {
            margin: 20px auto; width: 90%; padding: 3px; border-radius: 15px;
            background: #000; position: relative; overflow: hidden;
        }
        .brand-header::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotateLED 4s linear infinite; z-index: 1;
        }
        .brand-header-content {
            position: relative; z-index: 2; background: #000; padding: 20px; border-radius: 13px; text-align: center;
        }
        @keyframes rotateLED { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .brand-en { font-family: 'Orbitron', sans-serif; font-size: 18px; color: var(--gold); }

        .welcome-msg { text-align: center; padding: 10px; color: #888; font-size: 13px; }

        /* خشتەی بەشەکان و لیدی جۆراوجۆر */
        .services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        
        .service-card {
            background: #000; border-radius: 12px; padding: 3px; position: relative;
            overflow: hidden; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* لیدی بەشەکان */
        .service-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--clr));
            animation: rotateLED 3s linear infinite; z-index: 1;
        }

        .card-inner {
            position: relative; z-index: 2; background: #111; width: 100%; height: 100%;
            padding: 20px 10px; border-radius: 10px; text-align: center;
        }

        .moving-emoji { font-size: 35px; display: block; margin-bottom: 8px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .service-card h3 { font-size: 12px; color: #fff; margin: 0; }

        /* مۆدێڵ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 500px; margin: auto; background: #111; padding: 25px; border: 1px solid var(--gold); border-radius: 15px; }
        .info-card { background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-right: 4px solid var(--gold); text-align: right; }
        .price-tag { font-size: 32px; text-align: center; margin: 15px 0; color: var(--gold); font-weight: bold; }
        
        .rule-box { background: rgba(255,0,0,0.05); border: 1px dashed #555; padding: 10px; border-radius: 8px; font-size: 11px; margin-bottom: 15px; }

        .vip-input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--gold); font-size: 18px; text-align: center; margin-bottom: 10px; border-radius: 8px; }
        .btn-apply { width: 100%; padding: 18px; background: var(--gold); color: #000; font-weight: bold; font-size: 17px; border: none; border-radius: 8px; }

        #admin-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; padding: 20px; }
    </style>
</head>
<body>

    <div class="brand-header" id="admin-trigger">
        <div class="brand-header-content">
            <div class="brand-en">Hama Tech Phone VIP Pro</div>
        </div>
    </div>

    <div class="welcome-msg">بەخێربێیت بۆ بەشی خزمەتگوزارییە VIP یەکان</div>

    <div class="services-grid" id="main-grid"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="m-title" style="color:var(--gold); text-align:center; margin-top:0;"></h2>
        <div class="info-card"><h4>📖 زانیاری</h4><p id="m-desc"></p></div>
        <div class="info-card"><h4>⏱ کاتی پێویست</h4><p id="m-time"></p></div>
        <div class="price-tag" id="m-price"></div>
        <div class="rule-box">
            🛡️ ئەگەر کارەکە نەکرا ٪١٠٠ پارەکە دەگەڕێتەوە یان ٪١٠ داشکاندن. گەر بە هیچ شێوەیەک سەرنەگرت ٪٢ دەبڕدرێت.
        </div>
        <input type="text" class="vip-input" id="key-field" placeholder="کلیل (KEY) بنووسە">
        <button class="btn-apply" onclick="apply()">چالاککردن و ناردن</button>
        <button onclick="closeS()" style="width:100%; background:none; color:#777; border:none; margin-top:10px;">داخستن</button>
        <div id="status" style="text-align:center; margin-top:10px;"></div>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h2 style="color:var(--gold);">VIP KEYS</h2>
        <button onclick="document.getElementById('admin-panel').style.display='none'" style="color:red; background:none; border:none; font-size:30px;">×</button>
    </div>
    <div id="admin-data" style="height:80vh; overflow-y:auto; color:#0f0; border:1px solid #222; padding:10px; font-family:monospace;"></div>
</div>

<script>
    const keys = [];
    for(let i=1; i<=300; i++) keys.push(`HAMA-VIP-${Math.random().toString(36).substr(2,5).toUpperCase()}-${i}`);

    // ڕەنگی لیدی جۆراوجۆر بۆ بەشەکان
    const colors = ["#ff0000", "#00ff00", "#0000ff", "#ffff00", "#ff00ff", "#00ffff", "#ffa500", "#ffc0cb"];

    const services = [
        { t: "سناپچات پڵەس", e: "✨", p: 15000, time: "١ کاتژمێر", d: "چالاککردنی فەرمی یەک ساڵ بەبێ پاسۆرد." },
        { t: "تیکتۆک فێکس", e: "🎬", p: 45000, time: "١-٧ ڕۆژ", d: "هێنانەوەی ئەکاونتی تیکتۆک کە باند کراوە." },
        { t: "سناپچات SS06", e: "📱", p: 50000, time: "١-٧ ڕۆژ", d: "لادانی باندی ئامێر (Device Ban)." },
        { t: "ئایفۆن Bypass", e: "🔓", p: 75000, time: "١-٧ ڕۆژ", d: "تێپەڕاندنی ئایکلۆد بە شەبەکەوە." },
        { t: "هێنانەوەی وێنە", e: "🖼️", p: 40000, time: "١-٣ ڕۆژ", d: "گەڕاندنەوەی داتای سڕاوە دوای فۆرمات." },
        { t: "پاراستنی مۆبایل", e: "🛡️", p: 25000, time: "١ ڕۆژ", d: "پاککردنەوەی مۆبایل لە هاک و سیخوڕی." },
        { t: "فەیسبووک Recovery", e: "👤", p: 35000, time: "١-٧ ڕۆژ", d: "هێنانەوەی پەیج و ئەکاونتی هاککراو." },
        { t: "ئینستاگرام باند", e: "📸", p: 45000, time: "١-٧ ڕۆژ", d: "کردنەوەی باندی ئینستاگرام بە گەرەنتی." },
        { t: "ڕیپۆرت سیستم", e: "🚫", p: 20000, time: "١ ڕۆژ", d: "داخستنی ئەکاونتی ساختە و بێزارکەر." },
        { t: "کێشەی سۆفتوێر", e: "⚙️", p: 15000, time: "١ ڕۆژ", d: "چاککردنی هەموو کێشەیەکی سیستەم." },
        { t: "شکاندنی پاسۆرد", e: "🔑", p: 30000, time: "١-٣ ڕۆژ", d: "لادانی کۆدی شاشە بێ سڕینەوەی داتا." },
        { t: "کڕینی دۆلار", e: "💵", p: 5000, time: "١ کاتژمێر", d: "بارکردنی دۆلار بۆ یاری و بەرنامەکان." },
        { t: "سۆشیاڵ میدیا", e: "🚀", p: 10000, time: "١ ڕۆژ", d: "زیادکردنی فۆڵۆوەر و لایکی حەقیقی." },
        { t: "دۆزینەوەی مۆبایل", e: "🔍", p: 60000, time: "١-٧ ڕۆژ", d: "بەدواداچوونی مۆبایلی ونبوو بە IMEI." },
        { t: "هاککردنی یاری", e: "🎮", p: 20000, time: "١ ڕۆژ", d: "دابینکردنی فایلی هاک بۆ یارییەکان." },
        { t: "کێشەی تۆڕ", e: "📶", p: 25000, time: "١-٣ ڕۆژ", d: "چارەسەری نەنوسینی سیمکارت و سیگناڵ." },
        { t: "سێرڤەری VIP", e: "⚡", p: 10000, time: "١ کاتژمێر", d: "پێدانی سێرڤەری تایبەت بۆ پینگ." },
        { t: "ئەندرۆید Root", e: "🤖", p: 20000, time: "١ ڕۆژ", d: "ڕووتکردنی ئەندرۆید بە بێ کێشە." },
        { t: "دروستکردنی ئەکاونت", e: "✉️", p: 15000, time: "١ کاتژمێر", d: "ئەکاونتی ئەمریکی بۆ قازانج." },
        { t: "کۆد شکاندن", e: "🧱", p: 40000, time: "١-٣ ڕۆژ", d: "شکاندنی فایلی قفڵکراو." }
    ];

    let selectedS = {};

    function render() {
        const grid = document.getElementById('main-grid');
        services.forEach((s, idx) => {
            const clr = colors[idx % colors.length]; // دابەشکردنی ڕەنگەکان
            grid.innerHTML += `
                <div class="service-card" onclick="openS(${idx})" style="--clr: ${clr}">
                    <div class="card-inner">
                        <span class="moving-emoji">${s.e}</span>
                        <h3>${s.t}</h3>
                    </div>
                </div>`;
        });
    }

    function openS(idx) {
        selectedS = services[idx];
        document.getElementById('m-title').innerText = selectedS.t;
        document.getElementById('m-desc').innerText = selectedS.d;
        document.getElementById('m-time').innerText = selectedS.time;
        document.getElementById('m-price').innerText = selectedS.p.toLocaleString() + " IQD";
        document.getElementById('modal').style.display = 'block';
    }

    function closeS() { document.getElementById('modal').style.display = 'none'; }

    function apply() {
        const val = document.getElementById('key-field').value.trim();
        if(keys.includes(val)) {
            const msg = `🚀 *Hama Tech Order*%0A%0A📌 *Service:* ${selectedS.t}%0A💰 *Price:* ${selectedS.p.toLocaleString()} IQD%0A🔑 *Key:* ${val}%0A🛡️ 100% Refund | 2% Failed Fee.`;
            window.open(`https://wa.me/9647509395657?text=${msg}`, '_blank');
        } else {
            document.getElementById('status').innerHTML = "<b style='color:red'>❌ کلیلەکە هەڵەیە!</b>";
        }
    }

    const trigger = document.getElementById('admin-trigger');
    let timer;
    trigger.addEventListener('touchstart', () => timer = setTimeout(showAdmin, 3000));
    trigger.addEventListener('touchend', () => clearTimeout(timer));

    function showAdmin() {
        if(prompt("PASSWORD:") === "Xapokam10#") {
            const list = document.getElementById('admin-data');
            list.innerHTML = "";
            keys.forEach((k, idx) => list.innerHTML += `<div>${idx+1}. ${k}</div>`);
            document.getElementById('admin-panel').style.display = 'block';
        }
    }
    render();
</script>
</body>
</html>
