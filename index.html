<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hama Tech VIP 20-Section</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Orbitron:wght@600&display=swap');
        :root { --gold: #D4AF37; --bg: #050505; --card: #121212; }
        body { background-color: var(--bg); color: #e0e0e0; font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding-bottom: 20px; overflow-x: hidden; }

        /* بەشی سەرەوە: بازنەی جوڵاو بۆ ناو */
        .header-container {
            margin: 20px auto; width: 95%; height: 120px; position: relative; overflow: hidden;
            border-bottom: 2px solid var(--gold); background: #000;
        }
        .moving-circle {
            width: 100px; height: 100px; background: radial-gradient(circle, #222, #000);
            border: 3px solid var(--gold); border-radius: 50%; position: absolute; top: 10px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 20px var(--gold);
            animation: slideName 8s linear infinite alternate;
            cursor: pointer; user-select: none;
        }
        @keyframes slideName {
            0% { left: 0%; }
            100% { left: calc(100% - 110px); }
        }
        .moving-circle span { color: var(--gold); font-weight: bold; font-size: 14px; text-align: center; }

        /* خشتەی بەشەکان - چوارگۆشەی ڕێک */
        .services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .service-card { 
            background: var(--card); border: 1px solid #333; border-radius: 5px; /* چوارگۆشەی ڕێک */
            padding: 20px 10px; text-align: center; transition: 0.3s; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .service-card:active { border-color: var(--gold); background: #1a1a1a; }
        
        /* ئیمۆجی جوڵاو */
        .service-card i { font-size: 40px; margin-bottom: 12px; display: block; animation: bounceEmoji 2s infinite; }
        @keyframes bounceEmoji {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .service-card h3 { font-size: 12px; color: var(--gold); margin: 0; font-weight: bold; }

        /* مۆدێڵ */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 9999; overflow-y: auto; padding: 20px; }
        .info-box { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-right: 4px solid var(--gold); text-align: right; }
        .price-tag { font-size: 30px; text-align: center; margin: 20px 0; color: #fff; font-weight: bold; }
        .btn-apply { width: 100%; padding: 20px; background: var(--gold); border: none; border-radius: 10px; color: #000; font-weight: bold; font-size: 18px; cursor: pointer; }
        .input-vip { width: 100%; padding: 15px; background: #222; border: 1px solid var(--gold); border-radius: 8px; color: var(--gold); text-align: center; margin-bottom: 15px; font-size: 18px; box-sizing: border-box; }

        /* ئەدمین پەنێڵ */
        #admin-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; padding: 20px; }
        .admin-list { height: 80vh; overflow-y: auto; border: 1px solid #333; padding: 10px; }
        .admin-row { padding: 10px; border-bottom: 1px solid #222; color: #0f0; font-family: monospace; font-size: 11px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="moving-circle" id="admin-trigger">
            <span>حەمە<br>هەرکی</span>
        </div>
    </div>

    <div class="services-grid" id="main-grid"></div>

<div id="modal" class="modal">
    <div style="max-width:500px; margin:auto;">
        <button onclick="closeS()" style="background:#333; color:#fff; border:none; padding:10px 20px; border-radius:5px; margin-bottom:20px;">✕ داخستن</button>
        <h2 id="m-title" style="color:var(--gold); text-align:center;"></h2>
        <div class="info-box"><h4>📖 زانیاری</h4><p id="m-desc"></p></div>
        <div class="info-box"><h4>⏱ کاتی پێویست</h4><p id="m-time"></p></div>
        <div class="price-tag" id="m-price"></div>
        <input type="text" class="input-vip" id="key-field" placeholder="کلیل (KEY) بنووسە">
        <button class="btn-apply" onclick="apply()">چالاککردن و ناردن بۆ واتسئەپ</button>
        <div id="status" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
    </div>
</div>

<div id="admin-panel">
    <div style="display:flex; justify-content:space-between;"><h2 style="color:var(--gold);">Admin Keys</h2><button onclick="document.getElementById('admin-panel').style.display='none'" style="color:red; background:none; border:none; font-size:20px;">X</button></div>
    <div class="admin-list" id="admin-data"></div>
</div>

<script>
    const keys = [];
    for(let i=1; i<=300; i++) keys.push(`HAMA-VIP-${Math.random().toString(36).substr(2,5).toUpperCase()}-${i}`);

    const services = [
        { t: "سناپچات پڵەس", i: "✨", p: 15000, time: "١ کاتژمێر", d: "چالاککردنی فەرمی بۆ یەک ساڵ." },
        { t: "تیکتۆک فێکس", i: "🎬", p: 45000, time: "١-٧ ڕۆژ", d: "هێنانەوەی ئەکاونتی باندکراو." },
        { t: "سناپچات SS06", i: "📱", p: 50000, time: "١-٧ ڕۆژ", d: "لادانی باندی ئامێر." },
        { t: "ئایفۆن Bypass", i: "🔓", p: 75000, time: "١-٧ ڕۆژ", d: "تێپەڕاندنی ئایکلۆد بە سیمکارت." },
        { t: "هێنانەوەی وێنە", i: "🖼️", p: 40000, time: "١-٣ ڕۆژ", d: "گەڕاندنەوەی داتای سڕاوە." },
        { t: "پاراستنی مۆبایل", i: "🛡️", p: 25000, time: "١ ڕۆژ", d: "پاککردنەوە لە هاک و سیخوڕی." },
        { t: "فەیسبووک Recovery", i: "👤", p: 35000, time: "١-٧ ڕۆژ", d: "هێنانەوەی پەیج و ئەکاونت." },
        { t: "ئینستاگرام باند", i: "📸", p: 45000, time: "١-٧ ڕۆژ", d: "کردنەوەی باندی ئینستاگرام." },
        { t: "ڕیپۆرت سیستم", i: "🚫", p: 20000, time: "١ ڕۆژ", d: "داخستنی ئەکاونتی ساختە." },
        { t: "کێشەی سۆفتوێر", i: "⚙️", p: 15000, time: "١ ڕۆژ", d: "فلاشکردن و چاککردنی سیستم." },
        { t: "شکاندنی پاسۆرد", i: "🔑", p: 30000, time: "١-٣ ڕۆژ", d: "لادانی کۆدی شاشە بێ فۆرمات." },
        { t: "کڕینی دۆلار", i: "💵", p: 5000, time: "١ کاتژمێر", d: "بارکردنی یو سی و دۆلاری یاری." },
        { t: "سۆشیاڵ میدیا", i: "🚀", p: 10000, time: "١ ڕۆژ", d: "فۆڵۆوەر و لایکی ڕاستەقینە." },
        { t: "دۆزینەوەی مۆبایل", i: "🔍", p: 60000, time: "١-٧ ڕۆژ", d: "بەدواداچوون بەپێی IMEI." },
        { t: "هاککردنی یاری", i: "🎮", p: 20000, time: "١ ڕۆژ", d: "سکرێپتی دژە باند." },
        { t: "کێشەی تۆڕ", i: "📶", p: 25000, time: "١-٣ ڕۆژ", d: "چاککردنی سیگناڵ و سیمکارت." },
        { t: "سێرڤەری VIP", i: "⚡", p: 10000, time: "١ کاتژمێر", d: "ڤی پی ئێنی خێرا بۆ یاری." },
        { t: "ئەندرۆید Root", i: "🤖", p: 20000, time: "١ ڕۆژ", d: "ڕووتکردنی سەلامەتی ئەندرۆید." },
        { t: "دروستکردنی ئەکاونت", i: "✉️", p: 15000, time: "١ کاتژمێر", d: "ئەکاونتی ئەمریکی و ئەوروپی." },
        { t: "کۆد شکاندن", i: "🧱", p: 40000, time: "١-٣ ڕۆژ", d: "کردنەوەی فایلی قفڵکراو." }
    ];

    function render() {
        const g = document.getElementById('main-grid');
        services.forEach(s => {
            g.innerHTML += `
                <div class="service-card" onclick="openS('${s.t}', '${s.d}', ${s.p}, '${s.time}')">
                    <i>${s.i}</i>
                    <h3>${s.t}</h3>
                </div>`;
        });
    }

    function openS(t, d, p, time) {
        document.getElementById('m-title').innerText = t;
        document.getElementById('m-desc').innerText = d;
        document.getElementById('m-time').innerText = time;
        document.getElementById('m-price').innerText = p.toLocaleString() + " IQD";
        document.getElementById('modal').style.display = 'block';
        document.getElementById('status').innerText = "";
    }

    function closeS() { document.getElementById('modal').style.display = 'none'; }

    function apply() {
        const key = document.getElementById('key-field').value.trim();
        const status = document.getElementById('status');
        const service = document.getElementById('m-title').innerText;
        if(keys.includes(key)) {
            status.style.color = "#0f0";
            status.innerText = "✅ کلیلەکە ڕاستە! پەیوەندیت پێوە دەکرێت...";
            setTimeout(() => {
                const msg = `سڵاو کاک حەمە%0Aمن ئەم خزمەتگوزارییەم چالاک کرد: ${service}%0Aکلیل: ${key}`;
                window.location.href = `https://wa.me/9647509395657?text=${msg}`;
            }, 2000);
        } else {
            status.style.color = "red";
            status.innerText = "❌ کلیلەکە هەڵەیە!";
        }
    }

    const trigger = document.getElementById('admin-trigger');
    let timer;
    trigger.addEventListener('mousedown', () => timer = setTimeout(showAdmin, 3000));
    trigger.addEventListener('mouseup', () => clearTimeout(timer));
    trigger.addEventListener('touchstart', () => timer = setTimeout(showAdmin, 3000));
    trigger.addEventListener('touchend', () => clearTimeout(timer));

    function showAdmin() {
        if(prompt("Admin Password:") === "Xapokam10#") {
            const list = document.getElementById('admin-data');
            list.innerHTML = "";
            keys.forEach((k, idx) => list.innerHTML += `<div class="admin-row"><span>${idx+1}. ${k}</span> <span>Online</span></div>`);
            document.getElementById('admin-panel').style.display = 'block';
        }
    }
    render();
</script>
</body>
</html>
