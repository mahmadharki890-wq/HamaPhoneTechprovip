<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hama Tech VIP Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Orbitron:wght@600&display=swap');
        
        :root { --gold: #D4AF37; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: 'Noto Sans Arabic', sans-serif; margin: 0; }

        /* ستایلی گشتی */
        .brand-header { text-align: center; padding: 25px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .brand-ku { font-size: 28px; font-weight: bold; color: var(--gold); }
        
        .services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; }
        .service-card {
            background: #111; border-radius: 15px; padding: 20px; text-align: center;
            border: 1px solid #222; cursor: pointer; transition: 0.3s;
        }
        .service-card img { width: 50px; margin-bottom: 10px; }

        /* پەنجەرەی زانیارییەکان (Popup) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px; overflow-y: auto; }
        .modal-content { 
            max-width: 400px; margin: 50px auto; background: #0d0d0d; 
            padding: 25px; border-radius: 20px; border: 1px solid var(--gold); text-align: right;
        }

        /* بەشی شاردراوە */
        .locked-content {
            background: rgba(212, 175, 55, 0.05); border: 1px dashed #444;
            padding: 20px; border-radius: 12px; margin-top: 15px; text-align: center;
        }
        .unlocked-data { display: none; margin-top: 20px; border-top: 2px solid var(--gold); padding-top: 20px; }

        .vip-input { 
            width: 100%; padding: 15px; background: #000; border: 1px solid #333; 
            color: var(--gold); font-size: 16px; text-align: center; margin: 15px 0; border-radius: 10px; box-sizing: border-box;
        }
        .btn-action { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-wa { background: #25D366; color: #fff; text-decoration: none; display: block; }
    </style>
</head>
<body>

<div class="brand-header">
    <span class="brand-ku">حەمە هەرکی</span>
    <div style="color: #666; font-size: 12px;">Hama Tech Phone VIP Pro</div>
</div>

<div class="services-grid" id="main-grid"></div>

<div id="service-modal" class="modal">
    <div class="modal-content">
        <h2 id="m-title" style="color:var(--gold); text-align:center;"></h2>
        
        <div id="public-info">
            <p><b>📜 کورتەیەک:</b> <span id="m-short-desc"></span></p>
            <p style="font-size: 13px; color: #888;">بۆ بینینی نرخ، گەرەنتی و کاتی تەواوبوون، تکایە کلیلەکەت لێ بدە.</p>
        </div>

        <div id="lock-section" class="locked-content">
            <span style="font-size: 20px;">🔒 بەشی پارێزراو</span>
            <input type="text" class="vip-input" id="key-input" placeholder="کلیل (KEY) لێرە بنووسە">
            <button class="btn-action btn-gold" onclick="unlockDetails()">کلیل لێ بدە</button>
        </div>

        <div id="private-info" class="unlocked-data">
            <h3 style="color:#0f0; text-align:center;">✅ زانیارییەکان کرانەوە</h3>
            <p><b>📝 وردەکاری کامل:</b> <span id="m-full-desc"></span></p>
            <p><b>⏱ کاتی پێویست:</b> <span id="m-time"></span></p>
            <p style="font-size: 28px; color:var(--gold); text-align:center; font-weight:bold;" id="m-price"></p>
            <p id="m-refund" style="color:#0f0; font-size:12px; text-align:center;"></p>
            
            <a href="#" id="wa-link" class="btn-action btn-wa" style="text-align:center;">ناردنی داواکاری بۆ واتسئەپ</a>
        </div>

        <button onclick="closeModal()" style="width:100%; margin-top:20px; background:none; border:none; color:#555;">داخستن</button>
    </div>
</div>

<script>
    // لیستی کلیلەکان
    const keys = { "100": ["HAMA-100"], "20": ["HAMA-20"], "10": ["HAMA-10-81RL"] };

    // لیستی بەشەکان
    const services = [
        { 
            t: "سناپچات پڵەس", 
            i: "snapchat", 
            short: "چالاککردنی سناپچات پڵەس بۆ ماوەی یەک ساڵ.",
            full: "چالاککردنی فەرمی بەبێ پاسۆرد، گەرەنتی نەمانی باند و سڕینەوە بۆ ماوەی ١٢ مانگ.",
            p: 15000, 
            time: "١ کاتژمێر" 
        },
        { 
            t: "تیکتۆک فێکس", 
            i: "tiktok", 
            short: "هێنانەوەی ئەکاونتی تیکتۆکی باندکراو.",
            full: "چارەسەری باندی Impersonation و هەر جۆرە باندێکی تر لە ڕێگەی سێرڤەری فەرمییەوە.",
            p: 45000, 
            time: "١-٧ ڕۆژ" 
        }
        // دەتوانی بە هەمان شێوە ٢٠ بەشەکەی تر لێرە دابنێیت
    ];

    let activeS = null; let activeType = "";

    function render() {
        const grid = document.getElementById('main-grid');
        services.forEach((s, idx) => {
            grid.innerHTML += `
                <div class="service-card" onclick="openModal(${idx})">
                    <img src="https://img.icons8.com/color/96/${s.i}.png">
                    <h3>${s.t}</h3>
                </div>`;
        });
    }

    function openModal(idx) {
        activeS = services[idx];
        document.getElementById('m-title').innerText = activeS.t;
        document.getElementById('m-short-desc').innerText = activeS.short;
        
        // شاردنەوەی بەشی نهێنی لە سەرەتادا
        document.getElementById('private-info').style.display = 'none';
        document.getElementById('lock-section').style.display = 'block';
        document.getElementById('key-input').value = "";
        
        document.getElementById('service-modal').style.display = 'block';
    }

    function unlockDetails() {
        const val = document.getElementById('key-input').value.trim();
        let found = false;
        for(let type in keys) { if(keys[type].includes(val)) { activeType = type; found = true; break; } }
        
        if(found) {
            document.getElementById('lock-section').style.display = 'none';
            document.getElementById('private-info').style.display = 'block';
            
            document.getElementById('m-full-desc').innerText = activeS.full;
            document.getElementById('m-time').innerText = activeS.time;
            document.getElementById('m-price').innerText = activeS.p.toLocaleString() + " IQD";
            document.getElementById('m-refund').innerText = activeType === "100" ? "🛡️ گەرەنتی ١٠٠٪ پارە گەڕانەوە" : `🧧 داشکاندنی ${activeType}% بۆ کاتی شکست`;
            
            const msg = `🚀 داواکاری VIP\n📌 بەش: ${activeS.t}\n🔑 کلیل: ${val}\n💰 نرخ: ${activeS.p.toLocaleString()} IQD`;
            document.getElementById('wa-link').href = `https://wa.me/9647509395657?text=${encodeURIComponent(msg)}`;
        } else {
            alert("❌ کلیلەکە هەڵەیە یان بەکار هاتووە!");
        }
    }

    function closeModal() { document.getElementById('service-modal').style.display = 'none'; }

    render();
</script>
</body>
</html>
