<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAMA HERKI VIP 50 SECTIONS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@700&display=swap');
        
        body { background: #000; color: #fff; font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding-bottom: 50px; overflow-x: hidden; }

        /* تابلۆی لیدی حەمە هەرکی */
        .marquee-container {
            background: #050505; border-bottom: 3px solid #ff0000; padding: 15px 0; overflow: hidden; white-space: nowrap; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        .marquee-text {
            display: inline-block; font-size: 40px; font-weight: bold; color: #ff0000; text-shadow: 0 0 10px #ff0000; animation: marquee 15s linear infinite;
        }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }

        /* لیدی ڕەنگاوڕەنگ بۆ ٥٠ بەشەکە */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .card {
            background: #0a0a0a; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; position: relative; z-index: 1; border: 2px solid transparent; overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(#ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            animation: rotate-led 4s linear infinite; z-index: -2;
        }
        .card::after { content: ''; position: absolute; inset: 3px; background: #0a0a0a; border-radius: 12px; z-index: -1; }
        @keyframes rotate-led { 100% { transform: rotate(360deg); } }
        .card img { width: 45px; margin-bottom: 8px; }
        .card h3 { font-size: 13px; margin: 0; color: #fff; }

        /* مۆدێڵی VIP */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 999; padding: 20px; overflow-y: auto; }
        .modal-content { 
            max-width: 400px; margin: 20px auto; background: #000; padding: 25px; border-radius: 20px; border: 2px solid #ff0000; box-shadow: 0 0 40px #ff0000; text-align: center;
        }

        .public-info { padding-bottom: 15px; border-bottom: 1px solid #222; }
        .lock-box { padding: 20px 0; }
        .secret-info { display: none; animation: fadeIn 0.5s ease; border-top: 1px solid #333; padding-top: 15px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        input { width: 100%; padding: 14px; background: #111; border: 1px solid #444; color: #ff0000; text-align: center; margin: 15px 0; border-radius: 10px; font-size: 18px; font-weight: bold; }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-unlock { background: #ff0000; color: #fff; box-shadow: 0 0 15px #ff0000; }
        .btn-wa { background: #25D366; color: #fff; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<body>

<div class="marquee-container" id="admin-trigger">
    <div class="marquee-text">حــــــــــەمـــــە هــــــــــەرکـــــــــی - ٥٠ بەشی VIP - حــــــــــەمـــــە هــــــــــەرکـــــــــی</div>
</div>

<div class="grid" id="main-grid"></div>

<div id="v-modal" class="modal">
    <div class="modal-content">
        <div class="public-info">
            <h2 id="m-title" style="color:#ff0000;"></h2>
            <p id="m-short" style="color:#888; font-size: 14px;"></p>
        </div>
        
        <div id="lock-zone" class="lock-box">
            <p style="font-size: 12px; color: #aaa;">🔑 بۆ بینینی نرخ و وردەکاری تەواو کلیل لێ بدە</p>
            <input type="text" id="key-field" placeholder="HAMA-XXX">
            <button class="btn btn-unlock" onclick="checkKey()">ئۆپن کردنی هەموو بەشەکان</button>
        </div>

        <div id="vip-zone" class="secret-info">
            <p style="color:#0f0; font-weight: bold;">✅ بە سەرکەوتوویی کرایەوە</p>
            <p style="text-align: right;"><b>📄 وردەکاری کامل:</b> <br><span id="m-full" style="color:#ccc;"></span></p>
            <p style="text-align: right;"><b>⏱ کات:</b> <span id="m-time" style="color:#fffb00;"></span></p>
            <div id="m-price" style="font-size: 28px; color:#ff0000; font-weight: bold; margin: 15px 0;"></div>
            <a href="#" id="wa-link" class="btn btn-wa">داواکردن لە واتسئەپ</a>
        </div>
        
        <button onclick="closeModal()" style="margin-top:20px; background:none; border:none; color:#444; cursor:pointer;">✕ گەڕانەوە</button>
    </div>
</div>

<script>
    // دروستکردنی ١٠٠٠ کلیل
    const validKeys = Array.from({length: 1000}, (_, i) => `HAMA-${i + 1}`);

    // لیستی ٥٠ بەشەکە (بۆ ئەوەی کۆدەکە درێژ نەبێت لێرە دانەم ناوە، تەنها شوێنەکەم بۆ داناوی)
    const data = [];
    const titles = ["سناپچات پڵەس", "تیکتۆک فێکس", "سناپ SS06", "ئایفۆن Bypass", "هێنانەوەی وێنە", "فەیسبووک Recovery", "ئینستا باند", "سۆفتوێر", "ڕیپۆرت", "پاسۆرد", "دۆلار", "فۆڵۆوەر", "دۆزینەوەی مۆبایل", "هاک", "تۆڕ", "سێرڤەر", "ڕووت", "ئەکاونت", "کۆد شکاندن", "پاراستن"];
    
    // دروستکردنی ٥٠ بەش بە شێوەی ئۆتۆماتیکی (دەتوانی خۆت ناوەکانیان بگۆڕیت)
    for(let i=1; i<=50; i++) {
        let name = titles[i-1] || `خزمەتگوزاری ${i}`;
        data.push({
            t: name,
            i: i % 2 === 0 ? "snapchat" : "iphone",
            s: "زانیاری سەرەتایی دەربارەی ئەم بەشە...",
            f: "ئەمە وردەکاری کامل و نهێنییە کە تەنها دوای کلیلەکە دەردەکەوێت.",
            p: `${i * 5},000 IQD`,
            tm: "١-٣ ڕۆژ"
        });
    }

    function render() {
        const g = document.getElementById('main-grid');
        data.forEach((item, idx) => {
            g.innerHTML += `<div class="card" onclick="openM(${idx})"><img src="https://img.icons8.com/color/96/${item.i}.png"><h3>${item.t}</h3></div>`;
        });
    }

    function openM(idx) {
        const item = data[idx];
        window.current = item;
        document.getElementById('m-title').innerText = item.t;
        document.getElementById('m-short').innerText = item.s;
        document.getElementById('vip-zone').style.display = 'none';
        document.getElementById('lock-zone').style.display = 'block';
        document.getElementById('v-modal').style.display = 'block';
    }

    function checkKey() {
        const k = document.getElementById('key-field').value.trim();
        if(validKeys.includes(k)) {
            document.getElementById('lock-zone').style.display = 'none';
            document.getElementById('vip-zone').style.display = 'block';
            document.getElementById('m-full').innerText = window.current.f;
            document.getElementById('m-time').innerText = window.current.tm;
            document.getElementById('m-price').innerText = window.current.p;
            document.getElementById('wa-link').href = `https://wa.me/9647509395657?text=داواکاری:${window.current.t}_کلیل:${k}`;
        } else { alert("❌ کلیل هەڵەیە!"); }
    }

    function closeModal() { document.getElementById('v-modal').style.display = 'none'; }
    render();
</script>
</body>
</html>
