<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hama Tech Phone VIP Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;700&family=Orbitron:wght@600&display=swap');
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background-color: var(--bg); color: #e0e0e0; font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding-bottom: 20px; }

        .brand-header {
            margin: 20px auto; width: 90%; padding: 3px; border-radius: 15px;
            background: #000; position: relative; overflow: hidden; cursor: pointer;
        }
        .brand-header::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--gold));
            animation: rotateLED 4s linear infinite; z-index: 1;
        }
        .brand-header-content { position: relative; z-index: 2; background: #000; padding: 15px; border-radius: 13px; text-align: center; }
        @keyframes rotateLED { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .brand-ku { font-size: 24px; color: #fff; font-weight: bold; text-shadow: 0 0 10px var(--gold); display: block; }
        .brand-en { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--gold); letter-spacing: 1px; }

        .services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 15px; }
        .service-card {
            background: #000; border-radius: 12px; padding: 3px; position: relative;
            overflow: hidden; cursor: pointer; display: flex;
        }
        .service-card::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--clr));
            animation: rotateLED 3s linear infinite; z-index: 1;
        }
        .card-inner {
            position: relative; z-index: 2; background: #111; width: 100%; height: 100%;
            padding: 15px 5px; border-radius: 10px; text-align: center;
        }
        .service-card img { width: 45px; height: 45px; margin-bottom: 10px; }
        .service-card h3 { font-size: 12px; color: #fff; margin: 0; }

        /* مۆدێڵی کلیل (Unlock Modal) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; padding: 20px; }
        .modal-content { max-width: 400px; margin: auto; background: #111; padding: 25px; border: 1px solid var(--gold); border-radius: 15px; text-align: center; }
        
        .vip-input { width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: var(--gold); font-size: 18px; text-align: center; margin-bottom: 15px; border-radius: 8px; box-sizing: border-box; }
        .btn-unlock { width: 100%; padding: 15px; background: var(--gold); color: #000; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; }

        /* لاپەڕەی زانیاری خزمەتگوزاری */
        #info-view { display: none; position: fixed; inset: 0; background: #000; z-index: 10000; padding: 20px; overflow-y: auto; text-align: right; }
        .info-card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid var(--gold); margin-top: 20px; }
        .price-tag { font-size: 35px; color: var(--gold); font-weight: bold; text-align: center; margin: 20px 0; }
        .refund-text { color: #0f0; border: 1px dashed #0f0; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 15px; }
        .btn-wa { width: 100%; padding: 20px; background: #25D366; color: #fff; font-weight: bold; border: none; border-radius: 10px; font-size: 18px; }

        #admin-panel { display: none; position: fixed; inset: 0; background: #000; z-index: 10001; padding: 20px; }
    </style>
</head>
<body>

    <div class="brand-header" id="admin-trigger">
        <div class="brand-header-content">
            <span class="brand-ku">حەمە هەرکی</span>
            <span class="brand-en">Hama Tech Phone VIP Pro</span>
        </div>
    </div>

    <div class="services-grid" id="main-grid"></div>

<div id="unlock-modal" class="modal">
    <div class="modal-content">
        <h3 style="color:var(--gold);">🔐 چالاککردنی بەش</h3>
        <p style="font-size: 13px; color:#888;">تکایە کلیلەکە بنووسە بۆ بینینی زانیارییەکان</p>
        <input type="text" class="vip-input" id="key-input" placeholder="کلیل لێرە بنووسە">
        <button class="btn-unlock" onclick="checkKey()">چوونە ژوورەوە</button>
        <button onclick="closeUnlock()" style="background:none; border:none; color:#555; margin-top:10px;">پاشگەزبوونەوە</button>
    </div>
</div>

<div id="info-view">
    <button onclick="closeInfo()" style="color:red; background:none; border:none; font-size:25px;">✕ گەڕانەوە</button>
    <div class="info-card">
        <h2 id="v-title" style="color:var(--gold); text-align:center;"></h2>
        <p><b>📖 وردەکاری:</b> <span id="v-desc"></span></p>
        <p><b>⏱ کاتی پێویست:</b> <span id="v-time"></span></p>
        <div class="price-tag" id="v-price"></div>
        <div class="refund-text" id="v-refund"></div>
        <button class="btn-wa" onclick="sendToWA()">✅ ناردنی داواکاری بۆ واتسئەپ</button>
    </div>
</div>

<div id="admin-panel">
    <h2 style="color:var(--gold);">VIP ADMIN PANEL</h2>
    <div id="admin-data" style="height:70vh; overflow-y:auto; color:#0f0; border:1px solid #222; padding:10px; font-family:monospace; font-size:12px;"></div>
    <button onclick="document.getElementById('admin-panel').style.display='none'" style="width:100%; padding:15px; margin-top:10px;">داخستن</button>
</div>

<script>
    // دروستکردنی کلیلەکان بە جیاوازی داشکاندن
    const keys = {
        "100": [], // گەڕانەوەی ١٠٠٪
        "20": [],  // داشکاندنی ٢٠٪
        "10": []   // داشکاندنی ١٠٪
    };
    for(let i=1; i<=50; i++) keys["100"].push(`HAMA-100-${Math.random().toString(36).substr(2,4).toUpperCase()}`);
    for(let i=1; i<=50; i++) keys["20"].push(`HAMA-20-${Math.random().toString(36).substr(2,4).toUpperCase()}`);
    for(let i=1; i<=50; i++) keys["10"].push(`HAMA-10-${Math.random().toString(36).substr(2,4).toUpperCase()}`);

    const services = [
        { t: "سناپچات پڵەس", i: "snapchat", p: 15000, time: "١ کاتژمێر", d: "چالاککردنی فەرمی یەک ساڵ بەبێ پاسۆرد." },
        { t: "تیکتۆک فێکس", i: "tiktok", p: 45000, time: "١-٧ ڕۆژ", d: "هێنانەوەی ئەکاونتی تیکتۆک کە باند کراوە." },
        { t: "سناپچات SS06", i: "snapchat", p: 50000, time: "١-٧ ڕۆژ", d: "لادانی باندی ئامێر (Device Ban)." },
        { t: "ئایفۆن Bypass", i: "iphone", p: 75000, time: "١-٧ ڕۆژ", d: "تێپەڕاندنی ئایکلۆد بە شەبەکەوە." }
        // دەتوانی بەشەکانی تر لێرە زیاد بکەیتەوە وەک پێشوو...
    ];

    const colors = ["#ff0000", "#00ff00", "#0000ff", "#ffff00", "#ff00ff", "#00ffff"];
    let activeService = null;
    let activeKeyType = "";
    let activeKeyValue = "";

    function render() {
        const grid = document.getElementById('main-grid');
        services.forEach((s, idx) => {
            const clr = colors[idx % colors.length];
            grid.innerHTML += `
                <div class="service-card" onclick="triggerUnlock(${idx})" style="--clr: ${clr}">
                    <div class="card-inner">
                        <img src="https://img.icons8.com/color/96/${s.i}.png">
                        <h3>${s.t}</h3>
                    </div>
                </div>`;
        });
    }

    function triggerUnlock(idx) {
        activeService = services[idx];
        document.getElementById('unlock-modal').style.display = 'block';
    }

    function closeUnlock() { document.getElementById('unlock-modal').style.display = 'none'; }

    function checkKey() {
        const val = document.getElementById('key-input').value.trim();
        let found = false;
        
        for(let type in keys) {
            if(keys[type].includes(val)) {
                activeKeyType = type;
                activeKeyValue = val;
                found = true;
                break;
            }
        }

        if(found) {
            showInfo();
        } else {
            alert("❌ کلیلەکە هەڵەیە یان چالاک نەکراوە!");
        }
    }

    function showInfo() {
        document.getElementById('unlock-modal').style.display = 'none';
        document.getElementById('info-view').style.display = 'block';
        document.getElementById('v-title').innerText = activeService.t;
        document.getElementById('v-desc').innerText = activeService.d;
        document.getElementById('v-time').innerText = activeService.time;
        document.getElementById('v-price').innerText = activeService.p.toLocaleString() + " IQD";
        
        let refundMsg = "";
        if(activeKeyType === "100") refundMsg = "🛡️ گەرەنتی ١٠٠٪ پارە گەڕانەوە (Full Refund) بۆ ئەم کلیلە چالاکە.";
        if(activeKeyType === "20") refundMsg = "🎁 داشکاندنی ٢٠٪ بۆ ئەم خزمەتگوزارییە یان جاری داهاتوو.";
        if(activeKeyType === "10") refundMsg = "🎁 داشکاندنی ١٠٪ بۆ کاتی شکستهێنان یان داواکاری نوێ.";
        
        document.getElementById('v-refund').innerText = refundMsg + " (ئەگەر سەرنەگرت ٪٢ دەبڕدرێت)";
    }

    function closeInfo() { document.getElementById('info-view').style.display = 'none'; }

    function sendToWA() {
        const msg = `🚀 *داواکاری VIP*%0A📌 *بەش:* ${activeService.t}%0A🔑 *کلیل:* ${activeKeyValue}%0A🎟️ *جۆری کلیل:* %${activeKeyType}%0A💰 *نرخ:* ${activeService.p.toLocaleString()} IQD`;
        window.open(`https://wa.me/9647509395657?text=${msg}`, '_blank');
    }

    // Admin Panel
    const trigger = document.getElementById('admin-trigger');
    let timer;
    trigger.addEventListener('touchstart', () => timer = setTimeout(() => {
        if(prompt("PASS:") === "Xapokam10#") {
            const data = document.getElementById('admin-data');
            data.innerHTML = "";
            for(let type in keys) {
                data.innerHTML += `<h3 style='color:white'>TYPE: ${type}%</h3>`;
                keys[type].forEach(k => data.innerHTML += `<div>${k}</div>`);
            }
            document.getElementById('admin-panel').style.display = 'block';
        }
    }, 3000));
    trigger.addEventListener('touchend', () => clearTimeout(timer));

    render();
</script>
</body>
</html>
